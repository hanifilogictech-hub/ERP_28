{% extends "base_layout.html" %}
{% block content %}

<div class="page-card">

    <!-- TOP BAR -->
    <div class="erp-topbar">
        <div class="erp-topbar-title">
            Unapproved Orders Management
        </div>

        <div>
            <button class="approve-btn">
                Approve
            </button>
        </div>
    </div>

    <!-- FILTER ROW 1 -->
    <div class="filter-row unapproved-row-1">

        <input type="text"
               class="filter-input sm"
               placeholder="Transaction No">

        <button class="filter-btn sm">
            Search
        </button>

    <div class="date-field">
    <label>From Date</label>
    <input type="date" class="filter-input sm">
</div>

<div class="date-field">
    <label>To Date</label>
    <input type="date" class="filter-input sm">
</div>
</div>
    <!-- FILTER ROW 2 -->
    <div class="filter-row sales-row-2">

       <div class="custom-dropdown sm">

    <div class="dropdown-label">
        Select All <i class="fas fa-chevron-down"></i>
    </div>

    <div class="dropdown-menu-custom">
        <input type="text" class="dropdown-search">
    </div>

</div>
        <input type="text"
               class="filter-input sm"
               placeholder="Customer">

     
    </div>

    <!-- TABLE PANEL -->
    <div class="dash-panel wide">

        <table class="dash-table">
            <thead>
                <tr>
                    <th><input type="checkbox"></th>
                    <th>Tran No</th>
                    <th>Tran Date</th>
                    <th>Customer</th>
                    <th>NetTotal</th>
                </tr>
            </thead>

            <tbody>
                <tr>
                    <td colspan="6" class="empty-cell">
                        No data available in table
                    </td>
                </tr>
            </tbody>
        </table>

    </div>

    <!-- TABLE FOOTER -->
    <div class="table-bottom">

        <div class="records-info">
            Total Records : 0
        </div>



    </div>

</div>

<script>

// =====================================
// CUSTOM TYPING DROPDOWN
// =====================================
document.querySelectorAll(".custom-dropdown").forEach(function(dropdown) {

    const label = dropdown.querySelector(".dropdown-label");
    const menu = dropdown.querySelector(".dropdown-menu-custom");
    const input = dropdown.querySelector(".dropdown-search");

    if (!label || !menu || !input) return;

    // OPEN / CLOSE DROPDOWN
    label.addEventListener("click", function(e) {
        e.stopPropagation();

        // Close other dropdowns
        document.querySelectorAll(".dropdown-menu-custom").forEach(function(otherMenu) {
            if (otherMenu !== menu) {
                otherMenu.style.display = "none";
            }
        });

        menu.style.display =
            menu.style.display === "block" ? "none" : "block";

        input.focus();
    });

    // PREVENT CLOSE WHEN CLICK INSIDE
    menu.addEventListener("click", function(e) {
        e.stopPropagation();
    });

    // UPDATE LABEL WHILE TYPING
    input.addEventListener("keyup", function() {

        const icon = label.querySelector("i");

        label.innerHTML = this.value || "Select All";

        if (icon) {
            label.appendChild(icon);
        }
    });

});


// =====================================
// CLOSE WHEN CLICK OUTSIDE
// =====================================
document.addEventListener("click", function() {
    document.querySelectorAll(".dropdown-menu-custom").forEach(function(menu) {
        menu.style.display = "none";
    });
});

</script>

{% endblock %}
