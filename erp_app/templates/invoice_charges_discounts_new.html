{% extends "base_layout.html" %}
{% load static %}

{% block page_heading %}
<h1>Add/Edit Invoice Charges/Discounts</h1>
{% endblock %}

{% block content %}
<div style="background:#eef1f5; padding:18px; border:1px solid #d4d9e2; border-radius:6px;">
  <form method="POST" action="{{ form_action }}" style="max-width:900px;">
    {% csrf_token %}
    <div style="display:grid; grid-template-columns: 220px 1fr; gap:12px 22px; align-items:center;">
      <label>Charges/Discounts Name <span style="color:#c21a1a;">*</span></label>
      <input type="text"
             name="charge_discount_name"
             placeholder="Enter Charges/Discounts Name"
             required
             value="{{ record.charge_discount_name|default:'' }}"
             style="border:1px solid #7ca4d9; padding:8px 10px;">

      <label>Charges/Discount Type</label>
      <select name="charge_discount_type" style="border:1px solid #c9ced6; padding:8px 10px;">
        <option value="">Select On Option</option>
        {% for t in charge_types %}
        <option value="{{ t }}" {% if record.charge_discount_type == t %}selected{% endif %}>{{ t }}</option>
        {% endfor %}
      </select>

      <label>Apply For</label>
      <select name="apply_for" style="border:1px solid #c9ced6; padding:8px 10px;">
        <option value="">Select On Option</option>
        {% for t in apply_for_options %}
        <option value="{{ t }}" {% if record.apply_for == t %}selected{% endif %}>{{ t }}</option>
        {% endfor %}
      </select>

      <label></label>
      <label style="display:flex; align-items:center; gap:10px; font-weight:600;">
        <input type="checkbox" name="is_active" {% if record %}{% if record.is_active %}checked{% endif %}{% else %}checked{% endif %}> IsActive
      </label>
    </div>

    <div style="margin-top:22px; display:flex; gap:12px; justify-content:center;">
      <button type="submit" style="background:#f2cd00; border:0; padding:10px 20px; border-radius:26px; font-weight:700;">Save</button>
      <a href="{% url 'invoice_charges_discounts_list' %}" style="background:#ff3b30; color:white; padding:10px 20px; border-radius:26px; text-decoration:none; font-weight:700;">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
